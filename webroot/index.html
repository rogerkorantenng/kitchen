<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Drift Kitchen</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#ffe9c8;
      font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select:none; -webkit-user-select:none;
      position:fixed; inset:0;
      overscroll-behavior:none; touch-action:none;
    }
    #game-mount { position:fixed; inset:0; z-index:0; }
    #game-mount canvas { width:100% !important; height:100% !important; display:block; }

    #hud-overlay  { position:fixed; top:0; left:0; right:0; pointer-events:none; z-index:100; }
    #shop-overlay { position:fixed; inset:0; z-index:200; display:none; overflow-y:auto; }
    #controls-overlay { position:fixed; left:0; right:0; bottom:0; z-index:50; pointer-events:none; }

    /* ── HUD top bar ───────────────────────────────────────────────────────── */
    .hud-bar {
      display:flex; align-items:center; gap:8px; padding:8px 12px calc(8px + env(safe-area-inset-top, 0px));
      background:linear-gradient(180deg, rgba(92,58,30,0.97), rgba(74,46,22,0.92));
      border-bottom:3px solid #f97316;
      box-shadow:0 4px 18px rgba(0,0,0,0.3);
    }
    .hud-left { flex:1; min-width:0; }
    .hud-harbor { font-size:12px; font-weight:800; color:#7dd3fc; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 3px rgba(0,0,0,0.5); }
    .hud-craving { font-size:9px; color:#fbbf24; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; opacity:0.92; }
    .hud-center { flex-shrink:0; text-align:center; }
    .hud-day { font-size:8px; font-weight:800; letter-spacing:2px; color:#f0c98a; }
    .hud-timer {
      font-size:19px; font-weight:900; color:#fff; line-height:1.1; letter-spacing:1px;
      text-shadow:0 1px 6px rgba(0,0,0,0.5); font-variant-numeric:tabular-nums;
    }
    .hud-timer-low { color:#ef4444 !important; animation:pulse 0.8s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity:0.55; } }
    .hud-right { flex:1; display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
    .hud-rep { font-size:10px; letter-spacing:1px; }
    .hud-coins {
      display:flex; align-items:center; gap:4px;
      background:linear-gradient(135deg, rgba(251,191,36,0.28), rgba(251,191,36,0.12));
      border:2px solid rgba(251,191,36,0.6); border-radius:20px; padding:2px 12px;
      font-size:15px; font-weight:900; color:#fde68a; text-shadow:0 1px 3px rgba(0,0,0,0.4);
      font-variant-numeric:tabular-nums;
    }

    /* ── Control bar ───────────────────────────────────────────────────────── */
    .ctl-row {
      display:flex; align-items:flex-end; justify-content:space-between;
      padding:0 18px calc(18px + env(safe-area-inset-bottom, 0px));
    }
    .ctl-hint {
      position:absolute; left:50%; bottom:8px; transform:translateX(-50%);
      font-size:9px; color:rgba(92,58,30,0.55); font-weight:700; letter-spacing:0.5px;
      pointer-events:none; white-space:nowrap;
    }
    #btn-action {
      width:78px; height:78px; border-radius:50%; pointer-events:auto; cursor:pointer; flex-shrink:0;
      background:radial-gradient(circle at 38% 32%, #ffa64d, #f97316 55%, #c2410c);
      box-shadow:0 6px 18px rgba(249,115,22,0.5), 0 2px 4px rgba(0,0,0,0.3), inset 0 2px 3px rgba(255,255,255,0.35);
      border:3px solid rgba(255,255,255,0.45);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:transform 0.08s; touch-action:none;
    }
    #btn-action .ico { font-size:28px; line-height:1; }
    #btn-action .lbl { font-size:8px; font-weight:800; letter-spacing:1px; color:rgba(255,255,255,0.9); margin-top:1px; }
    #btn-action.btn-active { transform:scale(0.9); }

    .dpad { position:relative; width:148px; height:148px; flex-shrink:0; }
    .dpad-disc { position:absolute; inset:26px; background:rgba(92,58,30,0.16); border-radius:50%; }
    .dpad-btn {
      position:absolute; width:46px; height:46px; pointer-events:auto; cursor:pointer; touch-action:none;
      background:linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,240,220,0.82));
      border:2px solid rgba(255,255,255,0.7);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 3px 8px rgba(0,0,0,0.22); transition:transform 0.06s, background 0.06s;
    }
    .dpad-btn span { font-size:19px; font-weight:900; color:#c2410c; text-shadow:0 1px 1px rgba(255,255,255,0.6); }
    .dpad-btn.dpad-active { background:linear-gradient(180deg,#fb923c,#f97316); transform:scale(0.9); }
    .dpad-btn.dpad-active span { color:#fff; }
    .dpad-up    { top:0;   left:51px; border-radius:13px 13px 6px 6px; }
    .dpad-down  { bottom:0;left:51px; border-radius:6px 6px 13px 13px; }
    .dpad-left  { left:0;  top:51px;  border-radius:13px 6px 6px 13px; }
    .dpad-right { right:0; top:51px;  border-radius:6px 13px 13px 6px; }

    /* ── Shop overlay ──────────────────────────────────────────────────────── */
    .shop-root { min-height:100%; background:linear-gradient(180deg,#fff3df,#f6e6cb); padding-bottom:40px; }
    .shop-header {
      background:linear-gradient(180deg,#5c3a1e,#4a2e16); padding:22px 16px 16px; text-align:center;
      border-bottom:3px solid #f97316; position:sticky; top:0; z-index:10; box-shadow:0 4px 18px rgba(0,0,0,0.4);
    }
    .shop-h-title { font-size:24px; font-weight:900; color:#f97316; text-shadow:0 2px 8px rgba(249,115,22,0.4); }
    .shop-h-earned { font-size:30px; font-weight:900; color:#fbbf24; margin:6px 0; text-shadow:0 2px 10px rgba(251,191,36,0.4); }
    .shop-h-stats { display:flex; justify-content:center; gap:16px; font-size:11px; color:#f0d2a8; }
    .shop-avail-bar {
      display:flex; align-items:center; justify-content:space-between; padding:10px 18px;
      background:linear-gradient(90deg,#fffaf2,#fff3df); border-bottom:2px solid #e7d2ad;
      position:sticky; top:0; z-index:9; font-size:12px; color:#8b5e3c; font-weight:700;
    }
    .shop-avail { font-size:17px; font-weight:900; color:#f97316; background:rgba(249,115,22,0.1);
      border:1px solid rgba(249,115,22,0.3); border-radius:16px; padding:2px 12px; }
    .shop-body { padding:12px 14px 0; }
    .shop-sec-title {
      display:flex; align-items:center; gap:8px; margin:14px 2px 9px;
      font-size:9px; font-weight:800; letter-spacing:1.5px; color:#8b5e3c; text-transform:uppercase;
    }
    .shop-sec-title span { flex:1; height:1px; background:#e7d2ad; }
    .shop-empty { color:#8b5e3c; font-size:12px; text-align:center; padding:8px; }
    .shop-card, .shop-expand {
      display:flex; align-items:center; gap:11px; background:linear-gradient(135deg,#fffaf2,#fff3df);
      border:1.5px solid #e7d2ad; border-radius:14px; padding:9px 11px; margin-bottom:8px;
      box-shadow:0 2px 7px rgba(0,0,0,0.05);
    }
    .shop-card.aff { border-color:rgba(249,115,22,0.45); box-shadow:0 3px 12px rgba(249,115,22,0.12); }
    .shop-card.green.aff { border-color:rgba(34,197,94,0.45); }
    .shop-icon {
      width:42px; height:42px; border-radius:12px; flex-shrink:0; font-size:22px;
      display:flex; align-items:center; justify-content:center;
      background:rgba(249,115,22,0.1); border:1.5px solid rgba(249,115,22,0.18);
    }
    .shop-icon.greenbg { background:rgba(34,197,94,0.12); border-color:rgba(34,197,94,0.2); }
    .shop-icon.bluebg  { background:rgba(56,189,248,0.14); border-color:rgba(56,189,248,0.25); }
    .shop-info { flex:1; min-width:0; }
    .shop-name { font-size:13px; font-weight:800; color:#3a230f; }
    .shop-desc { font-size:9px; font-weight:600; color:#8b5e3c; margin-top:1px; }
    .shop-desc.orange { color:#f97316; } .shop-desc.green { color:#22c55e; } .shop-desc.blue { color:#0891b2; }
    .shop-pips { display:flex; gap:3px; margin-top:5px; }
    .shop-pips i { width:12px; height:12px; border-radius:3px; background:#e0cba6; }
    .shop-pips i.on { background:#f97316; box-shadow:0 1px 4px rgba(249,115,22,0.4); }
    .shop-pips i.on.green { background:#22c55e; box-shadow:0 1px 4px rgba(34,197,94,0.4); }
    .shop-buy {
      background:linear-gradient(135deg,#f97316,#e55c00); color:#fff; border:none; border-radius:10px;
      padding:8px 12px; font-size:11px; font-weight:800; cursor:pointer; min-width:68px;
      box-shadow:0 3px 10px rgba(249,115,22,0.35); white-space:nowrap;
    }
    .shop-buy.green { background:linear-gradient(135deg,#22c55e,#16a34a); box-shadow:0 3px 10px rgba(34,197,94,0.35); }
    .shop-buy.blue  { background:linear-gradient(135deg,#38bdf8,#0891b2); box-shadow:0 3px 10px rgba(56,189,248,0.35); }
    .shop-buy.off   { background:#d8c19c; box-shadow:none; cursor:not-allowed; }
    .shop-bar { margin-top:6px; height:6px; background:#e8dcc4; border-radius:4px; overflow:hidden; }
    .shop-bar > div { height:100%; background:linear-gradient(90deg,#f97316,#fbbf24); border-radius:4px; }
    .shop-foot { padding:16px 14px 28px; }
    .shop-next {
      width:100%; padding:16px; background:linear-gradient(135deg,#f97316,#e55c00); color:#fff;
      border:none; border-radius:16px; font-size:17px; font-weight:900; cursor:pointer;
      box-shadow:0 4px 20px rgba(249,115,22,0.5); border-bottom:3px solid rgba(0,0,0,0.2); letter-spacing:0.5px;
    }
  </style>
</head>
<body>
  <div id="game-mount"></div>
  <div id="hud-overlay"></div>
  <div id="shop-overlay"></div>

  <script src="phaser.min.js"></script>
  <script src="rpc.js"></script>
  <script src="constants.js"></script>
  <script src="InputManager.js"></script>
  <script src="ChefScene.js"></script>
  <script src="StationManager.js"></script>
  <script src="CustomerManager.js"></script>
  <script src="ChefController.js"></script>
  <script src="StaffManager.js"></script>
  <script src="KitchenExpander.js"></script>
  <script src="HUD.js"></script>
  <script src="ShopScreen.js"></script>
  <script src="ParticleEffects.js"></script>
  <script src="main.js"></script>
</body>
</html>
